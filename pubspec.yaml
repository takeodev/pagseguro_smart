name: pagseguro_smart
description: "Plugin em Flutter para integração com o PlugPagServiceWrapper da PagSeguro."

repository: https://github.com/takeodev/pagseguro_smart
version: 1.3.1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.takeodev.pagseguro_smart
        pluginClass: PlugPagServicePlugin